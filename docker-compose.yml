services:
  scraper:
    build: .
    env_file: .env
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    # Batch job: runs once and exits. Re-run with `docker compose run --rm scraper`.
    restart: "no"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  mongo-data:
