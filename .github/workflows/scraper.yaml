name: Daily Reading Scraping

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout out code
        uses: actions/checkout@v3

      - name: Set up Python version
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        # Posts each reading to the dreading-api-worker, which enriches it at the
        # edge via its Workers AI binding. Set these repository secrets:
        #   INGEST_URL   = https://<worker>.workers.dev/api/ingest
        #   INGEST_TOKEN = the worker's INGEST_TOKEN secret
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
        run: python lectura.py 
